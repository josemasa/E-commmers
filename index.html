<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Online</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body { font-family: Arial, sans-serif; background: #9fd5ee; margin: 0; padding: 8px; }

  /* ENCABEZADO MÁS COMPACTO */
  h1 {
    text-align: center;
    margin: 5px 0 0 0;
    line-height: 1.1;
  }

  h3 {
    text-align: center;
    margin: 2px 0 8px 0;
    font-weight: normal;
    font-size: 16px;
    line-height: 1.1;
  }

  /* TEXTO GIRATORIO */
 .marquesina {
  width: 100%;
  overflow: hidden;
  background: #007bff;
  color: white;
  padding: 10px 0;
  border-radius: 6px;
  margin-bottom: 10px;
  white-space: nowrap;
}

.marquesina span {
  display: inline-block;
  white-space: nowrap;
  padding-left: 100%;
  animation: deslizar 18s linear infinite;
  font-weight: bold;
  font-size: 15px;
  letter-spacing: 1px;
}

@keyframes deslizar {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

  @keyframes deslizar {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
  }

  #filtros { margin-bottom: 15px; text-align: center; }
  select, input[type="text"] { padding: 8px; margin: 5px; }
  #productos { display: flex; flex-wrap: wrap; justify-content: center; }

  .producto {
    background: rgb(186, 235, 241);
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 8px;
    margin: 6px;
    flex: 1 1 220px;
    max-width: 220px;
    text-align: center;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .producto img {
    width: 100px;
    height: auto;
    cursor: pointer;
    border-radius: 4px;
    margin-bottom: 6px;
  }

  .producto h3 {
    margin: 4px 0;
    font-size: 18px;
  }

  .cantidad { display: flex; justify-content: center; align-items: center; }
  .cantidad button { padding: 5px 10px; font-size: 16px; }
  .cantidad input { width: 50px; text-align: center; margin: 0 5px; }

  button.agregar {
    background-color: #25D366;
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
  }

  button.agregar:hover { background-color: #128C7E; }

  #boton-carrito {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #25D366;
    color: white;
    border: none;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    font-size: 24px;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
    cursor: pointer;
  }

  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  .modal-contenido {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .btn { padding: 10px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; }
  .whatsapp { background-color: #25D366; color: white; }
  .vaciar { background-color: #d9534f; color: white; }
  .seguir { background-color: #007bff; color: white; }

  #modal-img {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    z-index: 2000;
  }

  #modal-img img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 8px;
  }

  #modal-img span {
    position: absolute;
    top: 20px;
    right: 30px;
    color: white;
    font-size: 30px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>🛍️ Tienda Online</h1>
<h3>solo productos con stock</h3>

<!-- TEXTO GIRATORIO -->
<div class="marquesina">
  <span>  |  🚚 Envíos sin cargo  |  💳 Aceptamos transferencias y 💵Efectivo |  </span>
</div>

<div id="filtros">
  <input type="text" id="buscador" placeholder="🔍 Buscar producto..." oninput="filtrarProductos()">
  <select id="categoria" onchange="filtrarProductos()">
    <option value="">Todas las categorías</option>
  </select>
</div>

<div id="productos"></div>

<button id="boton-carrito" onclick="abrirCarrito()">🛒</button>

<script>
const sheetID = '1Bcfwxd2RidSKvpFnyKrnzddHpjUkpbuJtA6cXVQSZBE';
const sheetName = 'Hoja1';
const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=${sheetName}`;

let productos = [];
let seleccionados = [];
let categorias = [];

fetch(url)
  .then(res => res.text())
  .then(data => {
    const json = JSON.parse(data.substr(47).slice(0, -2));
    const rows = json.table.rows;
    rows.forEach(row => {
      const nombre = row.c[0]?.v || '';
      const precio = row.c[1]?.v || 0;
      const categoria = row.c[2]?.v || 'Sin categoría';
      productos.push({ nombre, precio, categoria });
      if (!categorias.includes(categoria)) categorias.push(categoria);
    });
    cargarCategorias();
    mostrarProductos(productos);
  });

function cargarCategorias() {
  const select = document.getElementById('categoria');
  categorias.sort().forEach(cat => {
    const option = document.createElement('option');
    option.value = cat;
    option.textContent = cat;
    select.appendChild(option);
  });
}

function mostrarProductos(lista) {
  const contenedor = document.getElementById('productos');
  contenedor.innerHTML = '';

  lista.forEach((p, index) => {
    const div = document.createElement('div');
    div.className = 'producto';
    const nombreArchivo = p.nombre.trim() + '.jpg';

    div.innerHTML = `
      <h3>${p.nombre}</h3>
      <img src="img/${nombreArchivo}" alt="${p.nombre}" 
           onclick="verImagen('img/${nombreArchivo}')"
           onerror="this.onerror=null; this.src='img/no-image.jpg';">
      <p>💵 $${p.precio}</p>
      <div class="cantidad">
        <button onclick="cambiarCantidad('cantidad-${index}', -1)">-</button>
        <input type="number" id="cantidad-${index}" min="1" value="1">
        <button onclick="cambiarCantidad('cantidad-${index}', 1)">+</button>
      </div>
      <button class="agregar"
        onclick="agregarAlPedido('${p.nombre}', ${p.precio}, 'cantidad-${index}')">
        Agregar
      </button>
    `;
    contenedor.appendChild(div);
  });
}

function cambiarCantidad(id, delta) {
  const input = document.getElementById(id);
  let valor = parseInt(input.value) || 1;
  valor = Math.max(1, valor + delta);
  input.value = valor;
}

function agregarAlPedido(nombre, precio, inputID) {
  const cantidad = parseInt(document.getElementById(inputID).value) || 1;
  const index = seleccionados.findIndex(p => p.nombre === nombre);
  if (index > -1) {
    seleccionados[index].cantidad += cantidad;
  } else {
    seleccionados.push({ nombre, precio, cantidad });
  }
}

function filtrarProductos() {
  const texto = document.getElementById('buscador').value.toLowerCase();
  const categoria = document.getElementById('categoria').value;
  const filtrados = productos.filter(p => 
    p.nombre.toLowerCase().includes(texto) &&
    (categoria === "" || p.categoria === categoria)
  );
  mostrarProductos(filtrados);
}
</script>

</body>
</html>
